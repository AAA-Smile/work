{% extends "base.html" %}
{% block title %}类型信息{% endblock %}
{% block stylecontent %}
<link href="/static/css/styles.css" rel="stylesheet"/>
{% endblock %}
{% block content %}
<div class="container-fluid px-4">
    <!-- 类型数量分布饼图 -->
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-chart-pie me-1"></i>
            电影类型分布（Top 10）
        </div>
        <div class="card-body">
            <div id="mainOne" style="width: 100%;height: 500px;"></div>
        </div>
    </div>
    
    <!-- 类型评分对比柱状图 -->
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-chart-bar me-1"></i>
            各类型电影平均评分（Top 10）
        </div>
        <div class="card-body">
            <div id="mainTwo" style="width: 100%;height: 450px;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% endblock %}
